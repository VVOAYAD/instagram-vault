name: Daily Instagram Post

on:
  schedule:
    - cron: '0 9 * * *'   # daily at 9am UTC (1pm Oman)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate 7 slides
        run: python post.py --generate
        env:
          GEMINI_API: ${{ secrets.GEMINI_API }}

      - name: Commit slides to repo
        run: |
          git config user.name "instagram-bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/ .last_post.json
          git diff --staged --quiet || git commit -m "carousel $(date +%Y-%m-%d)"
          git pull origin main --no-rebase -X ours
          git push

      - name: Wait for GitHub CDN
        run: sleep 30

      - name: Post to Instagram
        run: python post.py --post
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
