name: Daily Instagram Post

on:
  schedule:
    - cron: '0 9 * * *'   # 9am UTC daily — change this to your preferred time
  workflow_dispatch:        # lets you trigger manually from GitHub's UI anytime

permissions:
  contents: write           # needed to commit slides back to the repo

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic replicate requests Pillow

      # Phase 1: Claude generates carousel content + Flux generates background
      # image + Pillow builds all 7 slides and saves them to output/
      - name: Phase 1 — generate carousel
        run: python pipeline.py --phase1 --generate-if-empty
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}

      # Commit slides to the repo so Instagram can fetch them via public URL
      - name: Commit slides to repo
        run: |
          git config user.name "instagram-bot"
          git config user.email "bot@users.noreply.github.com"
          git add .processed.json .pending_plan.json output/
          git diff --staged --quiet || git commit -m "📸 carousel $(date +%Y-%m-%d)"
          git push

      # Wait for GitHub's CDN to make the raw files publicly accessible
      - name: Wait for GitHub CDN
        run: sleep 30

      # Phase 2: Post carousel using raw.githubusercontent.com image URLs
      - name: Phase 2 — post to Instagram
        run: python pipeline.py --phase2
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
